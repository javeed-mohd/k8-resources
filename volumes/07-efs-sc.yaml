# Storage Class is admin task
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: roboshop-efs
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: fs-0c4e63f768a948586        # Replace with your File System ID
  directoryPerms: "700"
  basePath: "/roboshop"
# reclaimPolicy: Retain